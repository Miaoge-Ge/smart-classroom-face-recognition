<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智慧课堂考勤管理系统</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/admin_style.css" rel="stylesheet">
    <link href="/static/css/modern.css" rel="stylesheet">
</head>
<body class="login-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-xl-8 col-lg-9 col-md-10">
                <div class="login-card my-5">
                    <div class="row g-0">
                        <div class="col-lg-5 d-none d-lg-block">
                            <div class="login-hero h-100">
                                <div class="login-hero-icon">
                                    <i class="fas fa-user-clock"></i>
                                </div>
                                <div class="login-hero-title">人脸识别考勤系统</div>
                                <div class="login-hero-subtitle">Smart Attendance System</div>
                                <div class="login-hero-badges">
                                    <span class="badge bg-light text-dark">安全登录</span>
                                    <span class="badge bg-light text-dark">实时监控</span>
                                    <span class="badge bg-light text-dark">数据报表</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-7">
                            <div class="p-4 p-md-5">
                                <div class="d-flex align-items-center gap-2 mb-3">
                                    <div class="login-mini-icon d-lg-none">
                                        <i class="fas fa-user-clock"></i>
                                    </div>
                                    <div>
                                        <div class="h4 mb-0">欢迎回来</div>
                                        <div class="text-muted small">使用账号密码登录系统</div>
                                    </div>
                                </div>
                        {% if error %}
                        <div class="alert alert-danger" role="alert">
                            {{ error }}
                        </div>
                        {% endif %}
                        <form action="/login" method="post">
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="username" name="username" placeholder="" required autofocus>
                                    <label for="username">用户名</label>
                                </div>
                                <div class="position-relative mb-3">
                                    <div class="form-floating">
                                        <input type="password" class="form-control" id="password" name="password" placeholder="" required>
                                        <label for="password">密码</label>
                                    </div>
                                    <button class="btn btn-sm btn-light login-eye" type="button" id="togglePassword" aria-label="显示或隐藏密码">
                                        <i class="fa-regular fa-eye" id="togglePasswordIcon"></i>
                                    </button>
                                </div>
                                <div class="d-grid">
                                    <button class="btn btn-primary btn-lg" type="submit">登录</button>
                                </div>
                        </form>
                    </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        (function () {
            const btn = document.getElementById('togglePassword');
            const input = document.getElementById('password');
            const icon = document.getElementById('togglePasswordIcon');
            if (!btn || !input || !icon) return;
            btn.addEventListener('click', () => {
                const isPwd = input.type === 'password';
                input.type = isPwd ? 'text' : 'password';
                icon.classList.toggle('fa-eye', !isPwd);
                icon.classList.toggle('fa-eye-slash', isPwd);
            });
        })();
    </script>
</body>
</html>
